<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a42d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#bg)"/>
  <!-- Document shape -->
  <path d="M 160 96 L 310 96 L 370 156 L 370 416 L 160 416 Z" fill="url(#doc)" stroke="#4a42d4" stroke-width="4"/>
  <!-- Document fold -->
  <path d="M 310 96 L 310 156 L 370 156 Z" fill="#d8d5ff" stroke="#4a42d4" stroke-width="4"/>
  <!-- Number "1" -->
  <text x="220" y="260" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="bold" fill="#6c63ff" text-anchor="start">1</text>
  <!-- Number "2" -->
  <text x="260" y="330" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#8b85ff" text-anchor="start">2</text>
  <!-- Number "3" -->
  <text x="290" y="390" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#b0abff" text-anchor="start">3</text>
  <!-- Hash/number indicator -->
  <text x="185" y="200" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#4a42d4" text-anchor="start">#</text>
</svg>
